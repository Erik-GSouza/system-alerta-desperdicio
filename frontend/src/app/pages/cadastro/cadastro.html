<!-- Tela de cadastro do Data Certa -->

<section class="cadastro-page">

  <!-- Lado esquerdo reservado para o background final do Figma -->
  <div class="left-side">
  </div>

  <!-- Lado direito com formulário -->
  <div class="right-side">

    <div class="cadastro-card">

      <!-- Ícone do usuário -->
      <div class="user-avatar">
        <i class="bi bi-person-plus-fill"></i>
      </div>

      <h2>Criar conta</h2>

      <!-- Campo email -->
      <div class="input-group-custom">
        <i class="bi bi-envelope"></i>

        <input
          type="email"
          id="cadastroEmail"
          name="cadastroEmail"
          placeholder="Email"
          autocomplete="email"
        >
      </div>

      <!-- Campo CPF -->
      <div class="input-group-custom">
        <i class="bi bi-card-text"></i>

        <input
          type="text"
          id="cpf"
          name="cpf"
          placeholder="CPF"
          inputmode="numeric"
          autocomplete="off"
        >
      </div>

      <!-- Campo senha -->
      <div class="input-group-custom">
        <i class="bi bi-lock"></i>

        <input
          type="password"
          id="cadastroSenha"
          name="cadastroSenha"
          placeholder="Senha"
          autocomplete="new-password"
        >

        <i class="bi bi-eye eye-icon"></i>
      </div>

      <div class="or-text">
        Ou
      </div>

      <!-- Botões sociais apenas visuais por enquanto -->
      <button class="social-button facebook-button">
        <i class="bi bi-facebook"></i>
        Conecte com Facebook
      </button>

      <button class="social-button google-button">
        <i class="bi bi-google"></i>
        Conecte com Google
      </button>

      <!-- Continuar leva para o dashboard por enquanto -->
      <a routerLink="/dashboard" class="continue-button">
        Continuar
      </a>

      <p class="login-text">
        JÁ TEM UMA CONTA?
        <a routerLink="/login">ENTRAR AGORA.</a>
      </p>

    </div>

  </div>

</section>
