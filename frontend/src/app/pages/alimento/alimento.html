<!-- Tela de Criar Estoque -->

<section class="alimento-page">

  <!-- Menu lateral -->
  <app-sidebar></app-sidebar>

  <!-- Conteúdo principal -->
  <main class="alimento-content">

    <!-- Topbar reutilizável -->
    <app-topbar></app-topbar>

    <!-- Área principal -->
    <div class="estoque-wrapper">

      <!-- topo -->
      <div class="topo-alimento">

        <!-- nome -->
        <div class="nome-area">

          <input
            type="text"
            placeholder="Nome do Alimento"
            class="input-nome"
          />

          <button class="btn-mini-scan">

            <i class="bi bi-upc-scan"></i>

          </button>

        </div>

      </div>

      <!-- card escuro -->
      <div class="card-remessa">

        <!-- parte superior -->
        <div class="linha-top">

          <!-- categorias -->
          <div class="categorias">

            <span class="titulo-categoria">
              Categorias
            </span>

          </div>

          <!-- peso -->
          <div class="campo-top">

            <label>Peso total:</label>

            <input type="text" placeholder="Kg">

          </div>

          <!-- quantidade -->
          <div class="campo-top">

            <label>Quantidade:</label>

            <input type="text" placeholder="Un.">

          </div>

          <!-- unidade -->
          <div class="campo-top">

            <label>Unidade de medida:</label>

            <select>
              <option>Select</option>
            </select>

          </div>

        </div>

        <!-- linha inferior -->
        <div class="linha-bottom">

          <!-- botões -->
          <div class="categoria-botoes">

            <button class="categoria ativo">
              Perecível
            </button>

            <button class="categoria">
              Não Perecível
            </button>

          </div>

          <!-- remessa -->
          <div class="detalhes-remessa">

            <!-- titulo -->
            <div class="titulo-remessa">

              <div class="linha"></div>

              <span>DETALHES DA REMESSA</span>

              <div class="linha"></div>

            </div>

            <!-- grid -->
            <div class="grid-remessa">

              <!-- lote -->
              <div class="campo-remessa">

                <label>Identificador de lote</label>

                <div class="input-icon">

                  <i class="bi bi-tag"></i>

                  <input type="text">

                </div>

              </div>

              <!-- data -->
              <div class="campo-remessa">

                <label>Data de lote:</label>

                <div class="input-icon">

                  <i class="bi bi-calendar-event"></i>

                  <input type="date">

                </div>

              </div>

              <!-- entrada -->
              <div class="campo-remessa">

                <label>Data de entrada:</label>

                <div class="input-icon">

                  <i class="bi bi-calendar-event"></i>

                  <input type="date">

                </div>

              </div>

              <!-- validade -->
              <div class="campo-remessa">

                <label>Prazo de vencimento estimado:</label>

                <div class="input-icon">

                  <i class="bi bi-calendar-event"></i>

                  <input type="date">

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- footer -->
      <div class="footer-estoque">

        <!-- scanner -->
        <button class="scanner-box">

          <i class="bi bi-upc-scan"></i>

          <span>
            Escanear <br>
            produto
          </span>

        </button>

        <!-- status -->
        <div class="status-scan">

          Nenhum item escaneado

        </div>

        <!-- limpar -->
        <button class="btn-limpar">

          <i class="bi bi-trash3"></i>

          <span>
            Limpar <br>
            campos
          </span>

        </button>

      </div>

      <!-- ações -->
      <div class="acoes">

        <button class="btn-confirmar">

          <i class="bi bi-check-circle"></i>

          Confirmar

        </button>

        <button class="btn-cancelar">

          <i class="bi bi-x-circle"></i>

          Cancelar

        </button>

      </div>

    </div>

  </main>

</section>
