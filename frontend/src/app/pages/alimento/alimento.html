<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Certa</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <!-- MENU -->
    <aside class="sidebar">

      <div class="logo">
        <h1>Data certa</h1>
      </div>

      <nav>
        <ul>
          <li>🏠 Home</li>
          <li>📦 Estoque</li>
          <li>⚠️ Alertas</li>
          <li>⚙️ Configurações</li>
        </ul>
      </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

      <!-- TOPO -->
      <header class="topbar">

        <input type="text" placeholder="Encontrar doador/item...">

        <div class="top-icons">
          <span>👤</span>
          <span>🔔</span>
        </div>

      </header>

      <!-- ITENS -->
      <section class="cards">

        <div class="card">
          <div class="item">Alimento1</div>
          <button>+1</button>
        </div>

        <div class="card">
          <div class="item">Alimento2</div>
          <button>+1</button>
        </div>

        <div class="card">
          <div class="item">Alimento3</div>
          <button>+1</button>
        </div>

        <div class="card">
          <div class="item">Alimento4</div>
          <button>+1</button>
        </div>

      </section>

      <!-- DOAÇÃO -->
      <section class="donation">

        <img src="img/qr.png" alt="QR Code">

        <div class="donation-info">
          <h2>Realizar Doação</h2>

          <button class="btn-doar">
            Continuar
          </button>

          <p>
            Os alimentos serão doados para empresas e pessoas necessitadas.
          </p>

        </div>

      </section>

    </main>

  </div>

</body>
</html>
